# SushiEngine dependency fragment — the dependencies the engine owns on top of
# what SushiRuntime already provides. `ss` aggregates this with the SushiStack
# base fragment and (transitively) SushiRuntime's own fragment when the engine is
# part of the workspace, then provisions everything into the shared
# dependencies/ tree.
#
# SushiEngine is built *on* SushiRuntime: it links the runtime and compiles the
# same SYCL program, so it needs every toolchain SushiRuntime needs. Rather than
# repeat those here, the [module] table below declares that dependency and `ss`
# folds the runtime's requirements into the engine's readiness picture.
#
# Field reference:
#   description    Human-readable purpose (shown by `ss doctor`).
#   required       false => a missing one warns but does not stop the build.
#   gpu_only       true  => only installed when GPU support is requested.
#   linux_apt      apt package names; empty list = not an apt/vcpkg package.
#   windows_vcpkg  vcpkg port names; empty list = not an apt/vcpkg package.
#   check_cmd      Optional command; exit 0 means "already installed".

[module]
# SushiEngine is orchestrated by SushiRuntime; every runtime dependency (hwloc,
# the SYCL toolchains) is also an engine dependency. `ss doctor` reports the
# engine ready only once these are satisfied too.
depends_on = ["sushiruntime"]

[sdl2]
description   = "SDL2 window/input/Vulkan-surface layer for the editor shell (se editor). The [vulkan] feature enables SDL's Vulkan surface path, which the editor's Vulkan backend requires. Editor is OFF by default, so this is optional for a plain library build."
required      = false
linux_apt     = ["libsdl2-dev"]
windows_vcpkg = ["sdl2[vulkan]"]
check_cmd     = ["pkg-config", "--exists", "sdl2"]

[vulkan-headers]
description   = "Vulkan API headers for the renderer (se build --render). Renderer is OFF by default, so this is optional for a plain library build."
required      = false
linux_apt     = ["libvulkan-dev"]
windows_vcpkg = ["vulkan-headers"]
check_cmd     = ["pkg-config", "--exists", "vulkan"]

[vulkan-loader]
description   = "Vulkan loader (vulkan-1 import library + ICD loader) the renderer links against. Paired with vulkan-headers."
required      = false
linux_apt     = ["libvulkan1"]
windows_vcpkg = ["vulkan-loader"]

[vulkan-memory-allocator]
description   = "AMD Vulkan Memory Allocator (VMA) — the renderer's GPU allocator."
required      = false
linux_apt     = ["libvulkan-memory-allocator-dev"]
windows_vcpkg = ["vulkan-memory-allocator"]

[vk-bootstrap]
description   = "vk-bootstrap — Vulkan instance/device/swapchain selection boilerplate for the renderer."
required      = false
linux_apt     = []
windows_vcpkg = ["vk-bootstrap"]

[glslang]
description   = "glslang (GLSL -> SPIR-V). Used by a build-time host tool that compiles the renderer's shaders to embedded SPIR-V headers; not a runtime dependency."
required      = false
linux_apt     = ["glslang-dev"]
windows_vcpkg = ["glslang"]
